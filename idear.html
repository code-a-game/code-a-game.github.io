<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referencer</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="intro.css">
    <style>
        .toc {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 20px;
        }

        .toc ul {
            list-style-type: none;
            padding: 0;
        }

        .toc ul li {
            margin: 5px 0;
        }

        /* Style nested lists (sub-items) */
        .toc ul ul {
            padding-left: 20px;
        }

        .toc ul li a {
            text-decoration: none;
            color: #007bff;
        }

        .toc ul li a:hover {
            text-decoration: underline;
        }

        .reference-section {
            margin-bottom: 30px;
        }

        .reference-list {
            list-style-type: none;
            padding-left: 0;
        }

        .reference-list li {
            margin-bottom: 10px;
        }

        .reference-list li a {
            color: #007bff;
            text-decoration: none;
        }

        .reference-list li a:hover {
            text-decoration: underline;
        }

        .reference-description {
            font-style: italic;
            color: #666;
            margin-top: 3px;
        }
    </style>  
</head>
<body>
    <div class="container">
        <header>
            <h1>Ideer til hvad du kan programmere</h1>
        </header>
        <main>
            <section id="p5js" class="ideas-section">
                <details open>
                    <summary>
                        <h2>Ideer til spil og opgaver</h2>
                    </summary>
                    <ul class="idea-list">
                        <li>
                            sten-saks-papir spil
                        </li>
                        <li>
                            Når en circle vises skal man klikke den hvorefter der kommer en ny circle et andet sted. Spillet tæller hvor mange cirkler eller andre objekter man kan klikke på et minut. 
                        </li>
                        <li>
                            ping-pong spil
                            <img src="../images/ideas/pong.png" alt="Old school pong game" class="content-img">

                        </li>
                    </ul>
                </details>
            </section>
        </main>
    </div>
</body>
</html>
